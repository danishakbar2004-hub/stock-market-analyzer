<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Nature UI</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
 font-family:'Poppins',sans-serif;
 background: radial-gradient(circle at top left,#3a7d5d,#1b4332 70%);
 color:#fff;
 overflow-x:hidden;
}

/* FLOATING LEAVES */
.leaf{
 position:absolute;
 width:140px;
 opacity:0.7;
 animation:float 8s ease-in-out infinite;
 filter:drop-shadow(0 20px 30px rgba(0,0,0,0.5));
}
.leaf:nth-child(1){top:40px;left:40px}
.leaf:nth-child(2){bottom:40px;right:60px;animation-delay:3s}
@keyframes float{
 0%,100%{transform:translateY(0) rotate(0deg)}
 50%{transform:translateY(-25px) rotate(5deg)}
}

/* HERO */
.hero{
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:100px 8%;
}
.hero h1{font-size:56px;font-weight:700}
.hero p{opacity:.8;margin:15px 0}
.hero button{
 padding:14px 35px;
 border-radius:30px;
 border:none;
 background:linear-gradient(145deg,#e6b980,#eacda3);
 color:#1b4332;
 font-weight:500;
 box-shadow:0 15px 40px rgba(0,0,0,0.5);
 transition:.3s;
}
.hero button:hover{transform:scale(1.08)}
.hero img{
 width:380px;
 border-radius:20px;
 box-shadow:0 40px 80px rgba(0,0,0,0.6);
}

/* GLASS BAR */
.features{
 margin:40px auto;
 width:85%;
 display:flex;
 justify-content:space-around;
 padding:35px;
 border-radius:30px;
 background:rgba(255,255,255,0.06);
 backdrop-filter:blur(25px);
 box-shadow:0 20px 50px rgba(0,0,0,0.5);
}
.features div{opacity:.9}

/* BUTTON CARDS */
.grid{
 width:85%;
 margin:auto;
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:30px;
 margin-top:40px;
}

.btn-card{
 padding:35px;
 border-radius:25px;
 text-align:center;
 font-weight:500;
 transition:.4s;
 box-shadow:0 20px 50px rgba(0,0,0,0.5);
}
.btn-card:hover{
 transform:translateY(-10px) scale(1.05);
}

.green{background:#5c8a5e}
.brown{background:#8a5a3b}
.beige{background:#a8886b}
.dark{background:#2f4f3f}
.lightgreen{background:#6a994e}
.orange{background:#bc6c25}

/* ANALYZER */
.analyzer{
 width:420px;
 margin:70px auto;
 padding:30px;
 border-radius:25px;
 background:rgba(0,0,0,0.35);
 backdrop-filter:blur(20px);
 box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

input{
 width:100%;
 padding:14px;
 border-radius:12px;
 border:none;
 margin-bottom:12px;
}

.analyze{
 width:100%;
 padding:14px;
 border:none;
 border-radius:25px;
 background:linear-gradient(135deg,#00c6ff,#0072ff);
}

</style>
</head>

<body>

<img class="leaf" src="https://pngimg.com/uploads/leaf/leaf_PNG368.png">
<img class="leaf" src="https://pngimg.com/uploads/leaf/leaf_PNG367.png">

<section class="hero">
 <div>
  <h1>Stock Analyzer</h1>
  <p>Premium product-level UI with nature aesthetics</p>
  <button>Get Started</button>
 </div>
 <img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6">
</section>

<section class="features">
 <div>Accuracy</div>
 <div>Data</div>
 <div>Tools</div>
 <div>Analysis</div>
</section>

<section class="grid">
 <div class="btn-card green">Overview</div>
 <div class="btn-card brown">Market Trend</div>
 <div class="btn-card beige">Predictions</div>
 <div class="btn-card dark">Analytics</div>
 <div class="btn-card lightgreen">Portfolio</div>
 <div class="btn-card orange">Insights</div>
</section>

<section class="analyzer">
 <input id="stockInput" placeholder="Enter Stock Symbol">
 <button class="analyze" onclick="loadStock()">Analyze</button>
 <canvas id="chart"></canvas>
</section>

<script>
let chart;
async function loadStock(){
 const symbol=document.getElementById('stockInput').value.toUpperCase();
 const apiKey="IYQ4P84EBAR6KALA";
 const url=`https://www.alphavantage.co/query?function=TIME_SERIES_DAILY&symbol=${symbol}&apikey=${apiKey}`;
 const res=await fetch(url);
 const data=await res.json();
 const series=data["Time Series (Daily)"];
 if(!series){alert("API limit reached");return}
 const dates=Object.keys(series).slice(0,5).reverse();
 const prices=dates.map(d=>parseFloat(series[d]["4. close"]));
 if(chart)chart.destroy();
 const ctx=document.getElementById('chart');
 chart=new Chart(ctx,{type:'line',data:{labels:dates,datasets:[{label:symbol,data:prices,borderColor:'#e6b980',tension:0.4}]}});
}
</script>

</body>
</html>
